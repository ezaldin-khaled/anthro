# Copy this into your main nginx (the one on 80/443).
# Use HTTP to 9080 only. Do NOT use https://127.0.0.1:9443 or you will get 400.
# Get a cert first: certbot certonly --webroot -w /var/www/html -d anthrotech.ae -d www.anthrotech.ae

server {
    listen 80;
    server_name anthrotech.ae www.anthrotech.ae;
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name anthrotech.ae www.anthrotech.ae;

    ssl_certificate     /etc/letsencrypt/live/anthrotech.ae/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/anthrotech.ae/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:9080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
