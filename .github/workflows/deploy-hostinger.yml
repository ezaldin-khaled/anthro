name: Deploy to Hostinger KVM

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Run deploy script on KVM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT || 22 }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            if [ ! -x "$HOME/deploy-anthro.sh" ]; then
              echo "Missing deploy script: $HOME/deploy-anthro.sh"
              exit 1
            fi
            "$HOME/deploy-anthro.sh"
